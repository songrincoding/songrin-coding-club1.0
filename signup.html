<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <link rel="stylesheet" href="login.css">
    <script src="app.js"></script>
</head>
<body>

    <div class="container">

        <h1>송린중 코딩 동아리</h1>

        <h2>회원가입</h2>

        <p class="notice-text">
            관리자 승인 후 로그인할 수 있습니다.
        </p>

        <input
            type="text"
            id="name"
            placeholder="이름"
        >

        <input
            type="text"
            id="studentId"
            placeholder="학번 (5자리)"
        >

        <input
            type="text"
            id="username"
            placeholder="아이디"
        >

        <input
            type="password"
            id="password"
            placeholder="비밀번호"
        >

        <input
            type="password"
            id="passwordCheck"
            placeholder="비밀번호 확인"
        >

        <button onclick="signup()">
            가입하기
        </button>

        <p>
            이미 계정이 있나요?
            <a href="login.html">로그인</a>
        </p>

    </div>

</body>
</html>
